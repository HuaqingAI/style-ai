view_summary:
  purpose: 林曼进入即时决策入口，开始处理具体参考对象。
  entry_context: 她在小红书或电商页面看到心动参考图，已经想买或想改造，却还在犹豫。
  exit_action: 选择导入外部参考图。
  user_state:
    hope: 她希望尽快把外部参考图变成自己身上的效果，马上判断值不值得买或改。
    worry: 她担心花了额度还是没有明确结论，或者流程太慢赶不上当下的决策窗口。

object_inventory:
  - id: obj-header
    name: 页面顶部导航/品牌区
    role: 说明这是 Style AI 的试穿入口。
    source: inferred-from-page-purpose
  - id: obj-entry-hero
    name: 入口主说明区
    role: 呈现核心承诺“把心动参考图先试到自己身上”。
    source: demo-data.entryPageCopy
  - id: obj-context-card
    name: 用户决策场景卡片
    role: 表达“看到心动参考图但还在犹豫”的即时决策情境。
    source: spec.entry_context
  - id: obj-reference-options
    name: 可导入内容说明
    role: 说明支持衣服、发型、妆容等参考对象。
    source: scenario.user_situation
  - id: obj-credit-notice
    name: 额度消耗提示
    role: 提前说明本次试穿消耗 1 个生成额度，余额 6。
    source: demo-data.credits
  - id: obj-profile-ready
    name: 常用本人形象状态
    role: 告诉用户已有可用本人形象，降低启动阻力。
    source: demo-data.profileImage
  - id: obj-primary-action
    name: 主按钮：导入参考图
    role: 触发退出动作，进入 03.2 import-reference。
    source: spec.exit_action
  - id: obj-secondary-action
    name: 次按钮：查看历史结果
    role: 提供已有结果/收藏上下文入口。
    source: demo-data.recentResults
  - id: obj-recent-results
    name: 最近结果摘要
    role: 展示已有生成历史，增强信任和连续性。
    source: demo-data.recentResults
  - id: obj-risk-reassurance
    name: 谨慎点/失败预期说明
    role: 缓解“花了额度但没结论、流程太慢”的担心。
    source: spec.mental_state.worry

functional_requirements:
  - 页面必须让用户快速理解：可以把外部参考图试到自己身上。
  - 页面必须展示本次流程的简短说明。
  - 页面必须展示额度消耗提示。
  - 主路径必须指向“导入外部参考图”。
  - 次路径可以提供查看历史结果的上下文。
  - 原型语言使用中文。
  - 只做 Mobile-Only，不做桌面断点。

sections:
  - id: 1
    name: Mobile Shell & Header
    status: complete
    completed: 2026-05-14
    actual_minutes: 10
    verification:
      static_checks: passed
      browser_automation: blocked-by-file-url-policy
      user_review: approved-by-sue
    issues:
      - In-app browser automation could not complete file:// viewport checks because Browser Use blocked local file URL automation by security policy.
    improvements: []
    estimate_minutes: 10
    objects:
      - obj-header
    acceptance_criteria:
      - 页面在 375px 到 428px 宽度内保持单列移动端框架。
      - 顶部区域清楚标识 Style AI 与当前试穿入口。
      - 不出现水平滚动。
    story_file: stories/01-mobile-shell-header.md

  - id: 2
    name: Entry Hero
    status: complete
    completed: 2026-05-14
    actual_minutes: 15
    verification:
      static_checks: passed
      browser_automation: passed-via-localhost-server
      user_review: approved-by-sue
    issues:
      - Initial title scale felt too poster-like during visual review.
      - Visible dashed Section 3 placeholder distracted from Section 2 review.
      - Subhead created a single-word orphan at 375px before adjustment.
    improvements:
      - Reduced hero title to 30px with 1.14 line-height.
      - Reduced subhead to 14px with 23px line-height.
      - Replaced visible Section 3 placeholder with a hidden spacer.
    estimate_minutes: 15
    objects:
      - obj-entry-hero
    acceptance_criteria:
      - 首屏能看到核心承诺：把心动参考图先试到自己身上。
      - 副说明说明导入参考图后会生成快速预览，帮助判断值不值得买或改。
      - 文案为中文，语气直接，不写使用教程式长说明。
