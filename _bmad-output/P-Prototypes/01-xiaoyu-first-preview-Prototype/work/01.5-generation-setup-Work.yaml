implementation_notes:
  - This prototype simulates generation task creation in browser; it does not call a backend or charge real credit.
  - The style selector intentionally avoids expert parameters and keeps choices mainstream.
  - The optional note is bounded to one short sentence so it does not turn into a complex prompt editor.
  - The next route is wired to 01.6-generation-waiting.html; that logical view is still the next prototype target.

