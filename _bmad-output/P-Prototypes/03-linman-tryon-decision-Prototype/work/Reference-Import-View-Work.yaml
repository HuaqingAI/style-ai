view_summary:
  purpose: 林曼从相册、截图或当前页面导入外部参考图，并在下一步设置前确认参考对象。
  entry_context: 她已经进入试穿决策流程，手上有一个想买或想尝试的具体参考对象。
  exit_action: 确认导入参考图，进入 03.3 tryon-setup。
  user_state:
    hope: 尽快把眼前的心动对象放进 Style AI。
    worry: 选错图、导入失败、还没确认就消耗额度。

object_inventory:
  - id: obj-import-header
    name: 页面顶部导航
    role: 标识当前导入步骤，并提供返回 03.1 的路径。
  - id: obj-import-hero
    name: 导入说明区
    role: 说明本页先导入参考图，下一步再确认本人形象和额度。
  - id: obj-import-source-options
    name: 导入来源选项
    role: 支持相册/截图、当前页面分享图、示例参考图。
  - id: obj-reference-preview
    name: 参考图预览
    role: 展示空状态、导入中、已导入和失败状态。
  - id: obj-reference-details
    name: 参考图信息
    role: 展示来源、类别、标题、决策问题和紧迫性。
  - id: obj-import-recovery
    name: 导入恢复提示
    role: 在失败或未选择时给出重试方式。
  - id: obj-confirm-reference-action
    name: 确认参考图主行动
    role: 导入成功后进入 03.3。
  - id: obj-prototype-state-controls
    name: 原型状态控制
    role: 支持评审各状态。

functional_requirements:
  - 生成额度必须说明为下一步确认后再消耗。
  - 未导入时主行动不可继续。
  - 导入成功后主行动指向 03.3-tryon-setup.html。
  - 支持 empty、importing、imported、error 四种状态。
  - 移动端 375/393/428px 宽度无水平滚动。

