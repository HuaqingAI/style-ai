view_summary:
  purpose: 林曼确认参考对象、本人形象和本次额度消耗后开始生成。
  entry_context: 她已经导入参考图，正处于生成前最后确认。
  exit_action: 点击开始生成，进入 03.4 tryon-waiting。
  user_state:
    hope: 少配置，快速确认后开始生成。
    worry: 选错图、本人形象不合适、额度被误扣。

object_inventory:
  - id: obj-setup-header
    name: 页面顶部导航
    role: 标识生成前设置确认，并提供返回 03.2 的路径。
  - id: obj-setup-hero
    name: 设置说明区
    role: 提醒用户确认参考图、本人形象和额度。
  - id: obj-setup-reference-summary
    name: 参考图摘要
    role: 展示本次导入对象、来源和决策问题。
  - id: obj-setup-profile-card
    name: 本人形象卡
    role: 展示常用本人形象可用状态，支持缺失状态。
  - id: obj-setup-intent-control
    name: 试穿意图选择
    role: 支持衣服、发型、妆容三类意图切换。
  - id: obj-setup-credit-confirmation
    name: 额度确认
    role: 展示余额、消耗和失败预期。
  - id: obj-start-generation-action
    name: 开始生成主行动
    role: 默认进入 03.4；异常状态给出反馈。
  - id: obj-setup-state-controls
    name: 原型状态控制
    role: 支持评审 default、missing-profile、low-credit、submitting、submit-error。

functional_requirements:
  - 默认状态主行动指向 03.4-tryon-waiting.html。
  - missing-profile 状态禁用主行动并提示重新选择本人照片。
  - low-credit 状态禁用主行动并提示余额不足。
  - submitting 状态展示提交中，避免重复点击。
  - submit-error 状态提供重试方式。
  - 移动端 375/393/428px 宽度无水平滚动。

