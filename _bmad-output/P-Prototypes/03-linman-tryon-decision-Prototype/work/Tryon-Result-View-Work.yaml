view_summary:
  purpose: 林曼查看本次试穿效果、推荐理由、谨慎点和下一步建议。
  entry_context: 03.4 等待页显示生成成功，结果已准备好。
  exit_action: 保存、加入对比、再试一个参考图，或进入后续历史/额度判断。
  user_state:
    hope: 立刻判断这件外套值不值得买。
    worry: 图像不像自己，推荐理由不够具体，额度花了但仍然无法决策。

object_inventory:
  - id: obj-result-header
    name: 页面顶部导航
    role: 标识当前结果页，并提供返回等待页和首页入口。
  - id: obj-result-hero
    name: 结果说明区
    role: 说明结果已完成、本次额度已扣除，并承接即时决策场景。
  - id: obj-result-viewer
    name: 本人试穿效果
    role: 展示林曼穿上奶油白短外套后的主视觉。
  - id: obj-result-reference-summary
    name: 参考对象摘要
    role: 展示参考对象、来源、紧迫性和决策问题。
  - id: obj-result-fit-summary
    name: 推荐与谨慎总结
    role: 展示推荐程度、适合理由、谨慎点和购买前检查。
  - id: obj-result-judgment-feedback
    name: 轻量判断反馈
    role: 收集像不像本人、能否帮助判断。
  - id: obj-result-next-actions
    name: 下一步动作
    role: 支持保存、加入对比、再试一个和额度入口。
  - id: obj-result-state-controls
    name: 原型状态控制
    role: 支持评审 default、saved、compared、detail、load-error。

functional_requirements:
  - 默认状态展示本人试穿主视觉、推荐结论、理由、谨慎点和下一步动作。
  - 保存状态必须显示结果已保存，不重复提示未保存。
  - 加入对比状态必须说明已加入 03.6 对比入口。
  - 详细状态必须展开更多购买前检查项。
  - 加载失败状态必须隐藏结果内容并提供重试和返回等待页。
  - 03.6 已建页时，保存/对比动作必须能继续进入 03.6；03.7 未建页时，用 toast 说明原型下一步。
  - 移动端 375/393/428px 宽度无水平滚动。

