implementation_notes:
  - This prototype simulates async task status in the browser; it does not call a backend or charge real credit.
  - The default page starts in queued state. Query parameter state=generating/finalizing/success/timeout/failed can open a specific state.
  - Keep the waiting experience transparent but calm; avoid expert model terms.

