view_summary:
  purpose: 林曼把刚生成的试穿结果保存到历史，并决定是否加入对比或收藏。
  entry_context: 03.5 结果页已经给出奶油白短外套的本人试穿效果和推荐理由。
  exit_action: 回到 03.5 继续查看结果，或进入后续 03.7 额度方案判断。
  user_state:
    hope: 不丢失本次结果，并能和最近结果放在一起继续判断。
    worry: 保存、收藏、常用形象和额度购买边界不清。

object_inventory:
  - id: obj-history-header
    name: 页面顶部导航
    role: 标识当前历史/收藏步骤，并提供返回 03.5 和入口页路径。
  - id: obj-history-hero
    name: 保存说明区
    role: 说明本页管理历史/收藏/对比，不会自动保存为常用形象。
  - id: obj-current-saved-result
    name: 当前保存结果
    role: 展示本次奶油白短外套结果、推荐结论、额度和决策问题。
  - id: obj-history-collection-actions
    name: 收藏与对比操作
    role: 支持加入对比、收藏、取消和状态反馈。
  - id: obj-compare-list
    name: 对比候选列表
    role: 展示当前结果与最近结果的对比关系。
  - id: obj-history-decision-actions
    name: 后续决策动作
    role: 提供回到结果、再试参考、查看额度方案等下一步。
  - id: obj-history-state-controls
    name: 原型状态控制
    role: 支持评审 default、compare、favorite、empty、save-error。

functional_requirements:
  - 页面必须说明历史保存不同于常用形象保存。
  - 当前结果必须展示参考对象、推荐结论、扣除额度、保存时间和决策问题。
  - 加入对比和收藏操作必须更新页面状态和可见文案。
  - 对比候选列表至少展示当前结果和两个最近结果。
  - 空历史和保存失败状态必须提供恢复路径。
  - 03.7 未建时额度入口必须使用原型提示。
  - 移动端 375/393/428px 宽度无水平滚动。

