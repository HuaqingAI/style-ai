requirements:
  purpose: "在首张真实预览生成期间维持信任感，让用户知道任务正在推进、成功后才扣除 1 次额度，失败或超时时有明确恢复路径。"
  implementation_position: "Standalone async waiting page after generation setup and before image result."
  success_criteria:
    - 用户能看到清晰的任务状态，而不是空白 loading。
    - 用户知道生成成功后才扣除 1 次额度；失败不会消耗额度。
    - 等待步骤用非技术语言解释当前处理内容。
    - 超时和失败时提供继续等待、重试、换照片、返回首页等恢复动作。
    - 成功状态提供进入结果页的明确出口。
  entry_points:
    - 01.5-generation-setup.html 创建模拟生成任务后进入。
  exit_points:
    - 01.7-image-result.html 查看生成结果。
    - 01.5-generation-setup.html 重试生成。
    - 01.3-photo-upload.html 换照片。
    - 01.2-home-dual-entry.html 返回首页。

object_registry:
  - id: generation-waiting-status
    type: Progress panel
    purpose: 显示当前生成状态、进度和预计等待说明。
    required: true
  - id: generation-waiting-credit-note
    type: Info note
    purpose: 说明本次额度只在成功后扣除，失败不会扣除。
    required: true
  - id: generation-waiting-detail-list
    type: Progress list
    purpose: 用非技术语言解释读取照片、生成预览、整理推荐理由与谨慎点。
    required: true
  - id: generation-waiting-recovery-actions
    type: Action group
    purpose: 在超时/失败/成功等状态提供恢复和下一步动作。
    required: true

states:
  - name: Queued
    data_state: queued
    trigger: 任务创建后等待执行
    requirements:
      - 显示排队中和轻量等待说明。
      - 可返回首页，但不强调取消。
  - name: Generating
    data_state: generating
    trigger: 模型正在处理
    requirements:
      - 显示生成中和进度推进。
      - 隐藏强恢复动作，仅保留后台继续处理的说明。
  - name: Finalizing
    data_state: finalizing
    trigger: 结果已返回，正在整理说明
    requirements:
      - 显示整理推荐理由和谨慎点。
      - 让用户预期即将进入结果页。
  - name: Success
    data_state: success
    trigger: 结果准备完成
    requirements:
      - 显示完成状态和进入结果页动作。
      - 说明本次成功后扣除 1 次额度。
  - name: Timeout
    data_state: timeout
    trigger: 等待超过合理时间
    requirements:
      - 说明任务可能仍在后台处理。
      - 提供继续等待、查看历史或返回首页动作。
  - name: Failed
    data_state: failed
    trigger: 生成失败
    requirements:
      - 明确说明失败不扣除额度。
      - 提供重试、换照片、返回首页动作。

sections:
  - number: 1
    name: Full Page Generation Waiting
    status: complete
    estimate_minutes: 120
    completed: 2026-05-14
    actual_minutes: 120
    approved_by: Pending qualitative review
    issues: []
    improvements: []
    object_ids:
      - generation-waiting-status
      - generation-waiting-credit-note
      - generation-waiting-detail-list
      - generation-waiting-recovery-actions
    scope:
      - Build the mobile shell, top bar, brand mark, task identity, and async status panel.
      - Implement progress ring/bar, status copy, and task phase labels for queued, generating, finalizing, success, timeout, and failed.
      - Add the credit handling note with success-only deduction and failure-safe copy.
      - Add the detail list for reading photo, generating preview, and organizing recommendation/caution notes.
      - Add context-aware recovery actions for normal waiting, success, timeout, and failed states.
      - Add prototype state controls and local JavaScript state fixtures.
    acceptance:
      - All four required Object IDs are present.
      - All six states can be switched locally and update status, progress, detail list, credit copy, and actions.
      - Failed and timeout states expose recovery actions.
      - Success state exposes the next route to 01.7-image-result.html.
      - 01.5-generation-setup.html start behavior can navigate into this page.
      - 375px, 393px, and 428px widths have no horizontal overflow.

