# Style Ai Workflow Prototype Scenario Development

## Action

Follow the prototype-scenario-development workflow:
1. Edit or add UX scenario markdown in _bmad-output/C-UX-Scenarios/[scenario]/[step].md
2. Update or create corresponding prototype HTML and assets in _bmad-output/P-Prototypes/[scenario]-Prototype/[step].html and related files
3. Update or add work YAMLs in _bmad-output/P-Prototypes/[scenario]-Prototype/work/[step]-Work.yaml
4. Update or add test scripts/results in _bmad-output/P-Prototypes/[scenario]-Prototype/testing/[test-folder]/
5. Update Logical-View-Map.md and/or PROTOTYPE-ROADMAP.md as needed
6. Log progress in _bmad-output/_progress/00-design-log.md

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: _bmad-output/C-UX-Scenarios/*/*.md, _bmad-output/P-Prototypes/*-Prototype/*.html, _bmad-output/P-Prototypes/*-Prototype/work/*.yaml

