implementation_notes:
  - This prototype does not use native Expo image picker APIs; it simulates camera, album, permission denied, and read error states in browser.
  - Keep upload, trust note, preview, and guidance patterns prototype-local until validated across the full DD-001 flow.
  - Treat this page as a reusable Photo Intake instance. Downstream flows should pass intent, photo requirements, and next target instead of duplicating picker logic.
  - Distinguish session photo, generation result, and persistent profile. Session photos can be reused within the current flow; persistent profile reuse requires explicit user save after seeing results.

next_step:
