open_questions:
  - question: 访问控制采用固定邀请码、手机号白名单、Google 账号白名单，还是后台生成授权？
    handling: Prototype uses fixed local invite code SEED-XIAOYU-001; production access control remains open. Page copy should stay like a normal login page.

implementation_notes:
  - Story files must be created just in time, one section at a time.
  - Do not implement future standalone welcome/onboarding page in DD-001.
  - Login must not trigger photo upload, profile save, or history creation.

next_step:
  workflow_step: 5-finalization
  next_section: Finalization
