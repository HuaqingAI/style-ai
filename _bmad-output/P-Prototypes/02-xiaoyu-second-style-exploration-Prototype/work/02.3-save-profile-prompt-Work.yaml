requirements:
  purpose: 小雨保存历史结果后，可选保存常用形象，并理解这不是强迫建档。
  entry_context: 她已经在 02.2 保存了一个有参考价值的历史结果。
  exit_action: 选择保存常用形象或暂不保存后结束场景。
  on_page_interactions:
    - 查看刚刚保存到历史的结果摘要。
    - 理解历史结果与常用形象的区别。
    - 保存常用形象，暂不保存，或保存失败后重试。
  user_concerns:
    - 不想被默认长期保存个人形象。
    - 需要知道不保存也可以继续使用。
    - 需要知道常用形象之后可以更换。

object_registry:
  - id: save-profile-header
    type: Mobile header
    purpose: 标识常用形象提示步骤，并提供返回 02.2 的路径。
    required: true
  - id: save-profile-hero
    type: Page prompt
    purpose: 询问是否保存当前形象为常用形象。
    required: true
  - id: save-profile-context
    type: Saved result context
    purpose: 说明历史结果已保存，本页是额外选择。
    required: true
  - id: save-profile-benefits
    type: Benefit list
    purpose: 展示保存常用形象的实际收益。
    required: true
  - id: save-profile-boundary-note
    type: Privacy boundary note
    purpose: 区分历史结果、常用形象和跳过选择。
    required: true
  - id: save-profile-primary-action
    type: Primary button
    purpose: 保存当前形象为常用形象。
    required: true
  - id: save-profile-skip-action
    type: Secondary button
    purpose: 暂不保存并结束场景。
    required: true
  - id: save-profile-state-feedback
    type: Status feedback
    purpose: 展示保存成功、跳过或保存失败反馈。
    required: true
  - id: save-profile-state-controls
    type: Prototype controls
    purpose: 切换 default、saving-profile、profile-saved、skipped、save-error 状态。
    required: true

states:
  - name: Default
    data_state: default
    requirements:
      - 展示可选保存常用形象提示、收益说明、边界说明和两个动作。
      - 主行动和跳过动作都可用。
  - name: Saving profile
    data_state: saving-profile
    requirements:
      - 主按钮显示保存中并禁用重复点击。
      - 暂不保存动作暂时禁用。
  - name: Profile saved
    data_state: profile-saved
    requirements:
      - 显示已保存为常用形象的成功反馈。
      - 主按钮变为返回首页。
  - name: Skipped
    data_state: skipped
    requirements:
      - 显示本次未保存常用形象的反馈。
      - 明确历史结果仍保留。
  - name: Save error
    data_state: save-error
    requirements:
      - 显示可恢复错误提示。
      - 用户可以重试保存或改为暂不保存。

sections:
  - number: 1
    name: Full Page Save Profile Prompt
    status: complete
