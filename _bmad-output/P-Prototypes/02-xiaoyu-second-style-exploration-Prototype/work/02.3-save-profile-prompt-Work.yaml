      - 展示刚保存到历史的结果上下文。
      - 解释保存常用形象的收益和隐私边界。
      - 实现保存与暂不保存两条结束路径。
      - 实现 default、saving-profile、profile-saved、skipped、save-error 本地状态控制。
    acceptance:
      - 必需 Object ID 全部存在。
      - 默认状态显示保存和暂不保存两个动作。
      - 保存动作进入 saving-profile 后转为 profile-saved。
      - 跳过动作进入 skipped 状态。
      - save-error 状态显示错误说明且两个动作仍可恢复。
      - 成功或跳过后主行动可返回首页。
      - 页面在 375px、393px、428px 宽度无横向滚动。
    story_file: stories/02.3.1-save-profile-prompt-full-page.md

