metadata:
  project: style-ai
  scenario: 01-xiaoyu-first-preview
  logical_view: Home Dual Entry View
  page_number: "01.2"
  page_name: home-dual-entry
  prototype_file: 01.2-home-dual-entry.html
  source_spec: _bmad-output/C-UX-Scenarios/01-xiaoyu-first-preview/01.2-home-dual-entry/01.2-home-dual-entry.md
  device_compatibility:
    type: Mobile-Only
    test_viewports:
      - name: iPhone SE
        width: 375
        height: 667
      - name: iPhone 14 Pro
        width: 393
        height: 852
      - name: iPhone 14 Pro Max
        width: 428
        height: 926
    touch_optimized: true
    hover_interactions: false
  design_fidelity: Design System Components
  primary_language: zh-CN
