implementation_notes:
  - This prototype simulates quality results in browser; it does not perform real face detection, blur detection, or backend image analysis.
  - The page uses neutral, practical copy and avoids appearance judgment.
  - Warning is intentionally non-blocking to keep first-use momentum while still surfacing risk.
  - Check unavailable must not imply a credit charge or generation-task creation.

