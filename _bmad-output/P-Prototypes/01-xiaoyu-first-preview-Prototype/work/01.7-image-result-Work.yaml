implementation_notes:
  - Redesign should model a single AI-generated fixed atlas plus server-side crop metadata, not multiple image generations.
  - The app should compose cropped visual tiles and structured text natively; the full atlas is not default primary content.
  - Save actions are local prototype state only; they do not persist to backend or demo-data.json.
  - The explore-another-style action now points to Scenario 02 page `/02-xiaoyu-second-style-exploration-Prototype/02.1-second-style-exploration.html` when served from the shared `P-Prototypes` root.

