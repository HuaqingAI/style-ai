  notes:
    - In-app Browser screenshot capture timed out, so the screenshot was generated separately with local headless Chrome.
    - Follow-up layout fix made primary sections `shrink-0` and added a CSS aspect-ratio/min-height fallback for the result preview so the flex scroll container does not compress visual content.
  passed:
    - Required object IDs exist.
    - default, saving-profile, profile-saved, skipped, and save-error states are switchable.
    - saving-profile disables both save and skip actions.
    - profile-saved sets profileSaved=true and changes the primary action to return home.
    - skipped keeps profileSaved=false and changes the primary action to return home.
    - save-error shows visible recovery feedback while keeping save and skip available.
    - Primary save action transitions from default to profile-saved after the saving state.
    - Skip action transitions from default to skipped.
    - 02.2 saved-state primary action routes to 02.3-save-profile-prompt.html.
    - 375px, 393px, and 428px widths have no horizontal overflow.
    - 375px, 393px, and 428px widths keep the saved-result context preview visible with stable height.
    - Text inside visible labels, cards, and buttons has no measured overflow at 375px, 393px, or 428px.
    - Console has no relevant errors.

