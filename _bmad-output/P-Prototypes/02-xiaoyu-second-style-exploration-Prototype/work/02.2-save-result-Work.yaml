requirements:
  purpose: 小雨看到第二次生成结果后，比较第一次和第二次方向，并保存一个她觉得有参考价值的结果。
  entry_context: 她已经在 02.1 选择了一个第二次探索方向并完成生成。
  exit_action: 点击保存结果，进入 02.3-save-profile-prompt。
  on_page_interactions:
    - 查看第二次生成的结果预览和方向说明。
    - 对照第一次结果与第二次结果。
    - 选择保存第一次或第二次结果。
    - 保存结果、查看已保存反馈，或保存失败后重试。
  user_concerns:
    - 不想保存错结果。
    - 需要知道两次结果的差异是否足够帮助判断。
    - 不想把历史结果保存误解成常用形象。

object_registry:
  - id: save-result-header
    type: Mobile header
    purpose: 标识保存结果步骤，并提供返回 02.1 的路径。
    required: true
  - id: save-result-hero
    type: Page intro
    purpose: 说明第二次结果已生成，现在保存有参考价值的结果。
    required: true
  - id: save-result-preview
    type: Result preview
    purpose: 展示第二次生成结果、方向标签和可判断信号。
    required: true
  - id: save-result-comparison
    type: Comparison panel
    purpose: 对比第一次和第二次结果的差异、适用判断和谨慎点。
    required: true
  - id: save-result-choice-group
    type: Radio-like choice group
    purpose: 允许选择保存第一次或第二次结果，默认第二次。
    required: true
  - id: save-result-value-note
    type: Explanatory note
    purpose: 解释保存到历史结果与保存常用形象的区别。
    required: true
  - id: save-result-primary-action
    type: Primary button
    purpose: 保存当前选择，成功后进入 02.3。
    required: true
  - id: save-result-secondary-actions
    type: Secondary action group
    purpose: 提供重新生成或回看第一次结果路径。
    required: true
  - id: save-result-state-controls
    type: Prototype controls
    purpose: 切换 default、saving、saved、save-error 状态。
    required: true

states:
  - name: Default
    data_state: default
    requirements:
      - 展示第二次结果、对照、保存选择和主行动。
      - 默认选择保存第二次结果。
  - name: Saving
    data_state: saving
    requirements:
      - 主按钮显示保存中并禁止重复点击。
      - 保留页面上下文不跳转。
  - name: Saved
    data_state: saved
    requirements:
      - 显示已保存反馈。
      - 主按钮文案变为继续。
      - 点击主按钮进入 02.3-save-profile-prompt.html。
  - name: Save error
    data_state: save-error
    requirements:
      - 显示可恢复错误提示。
      - 用户可重试保存或改选保存对象。

sections:
  - number: 1
    name: Full Page Save Result
    status: complete
    estimate_minutes: 120
    completed: 2026-05-18
    actual_minutes: 120
    object_ids:
      - save-result-header
      - save-result-hero
      - save-result-preview
      - save-result-comparison
      - save-result-choice-group
      - save-result-value-note
      - save-result-primary-action
      - save-result-secondary-actions
      - save-result-state-controls
    scope:
      - 建立移动端页面壳、顶部导航和品牌标识。
      - 展示第二次结果预览和生成完成信号。
      - 对照第一次与第二次结果的差异、适合判断的场景和谨慎点。
      - 实现保存对象选择，默认保存第二次结果。
      - 解释保存到历史结果与常用形象的区别。
      - 实现 default、saving、saved、save-error 本地状态控制。
    acceptance:
      - 必需 Object ID 全部存在。
      - 两个保存选择可见并可切换 active state。
      - 切换保存对象会更新保存说明和主按钮语义。
      - default 状态下主按钮可用。
      - saving 状态下主按钮禁用。
      - saved 状态显示成功反馈，主按钮指向 02.3。
      - save-error 状态显示错误说明和恢复入口。
      - 页面在 375px、393px、428px 宽度无横向滚动。
    story_file: stories/02.2.1-save-result-full-page.md

